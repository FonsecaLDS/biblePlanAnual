<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plano de Leitura Bíblica 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment: #f5f0e8;
      --parchment-dark: #e8dfc8;
      --ink: #1a1208;
      --ink-light: #3d2e10;
      --gold: #c9963a;
      --gold-light: #e8b84b;
      --red: #8b2020;
      --green: #1a5c2a;
      --shadow: rgba(26,18,8,0.12);
      --card: #fdf8f0;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── LOADING SPLASH ── */
    #splash {
      position: fixed; inset: 0;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; z-index: 9999;
      transition: opacity 0.4s;
    }
    #splash .cross { font-size: 4rem; color: var(--gold); }
    #splash p { color: #888; font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; }
    #splash.hidden { opacity: 0; pointer-events: none; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      background: linear-gradient(160deg, #1a1208 0%, #2d1f06 50%, #1a1208 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: var(--card);
      border-radius: 6px;
      padding: 3rem 2.5rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border-top: 4px solid var(--gold);
    }
    .login-logo { text-align: center; margin-bottom: 2.5rem; }
    .login-logo .cross { font-size: 3rem; color: var(--gold); display: block; }
    .login-logo h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; margin-top: 0.5rem; }
    .login-logo p { font-size: 0.75rem; color: #888; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.3rem; }
    .login-subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }

    .oauth-btn {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 4px;
      border: 1.5px solid var(--parchment-dark);
      background: var(--card);
      color: var(--ink);
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }
    .oauth-btn:hover { border-color: var(--gold); background: var(--parchment); }
    .oauth-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .oauth-btn.github { background: #24292e; color: #fff; border-color: #24292e; }
    .oauth-btn.github:hover { background: #1a1e22; }

    .divider-text {
      text-align: center;
      color: #aaa;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      margin: 1.5rem 0;
      position: relative;
    }
    .divider-text::before, .divider-text::after {
      content: '';
      position: absolute;
      top: 50%; width: 40%;
      height: 1px; background: var(--parchment-dark);
    }
    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }

    .error-msg { color: var(--red); font-size: 0.85rem; text-align: center; margin-top: 1rem; }

    /* ── HEADER ── */
    #header {
      background: var(--ink);
      color: var(--parchment);
      height: 58px;
      display: flex; align-items: center;
      padding: 0 1.5rem; gap: 1rem;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; color: var(--gold);
      margin-right: auto;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .nav-btn {
      background: none; border: none;
      color: #777; padding: 0.4rem 0.75rem;
      border-radius: 3px;
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .nav-btn:hover { color: #ddd; background: rgba(255,255,255,0.07); }
    .nav-btn.active { color: var(--gold); }
    .user-chip {
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(201,150,58,0.12);
      border: 1px solid rgba(201,150,58,0.35);
      color: var(--gold);
      padding: 0.3rem 0.75rem;
      border-radius: 20px; font-size: 0.8rem; font-weight: 700;
    }
    .user-chip img {
      width: 22px; height: 22px;
      border-radius: 50%; object-fit: cover;
    }

    /* ── MAIN ── */
    #main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── TODAY CARD ── */
    .today-card {
      background: var(--ink);
      color: var(--parchment);
      border-radius: 8px;
      padding: 2.5rem;
      margin-bottom: 2rem;
      position: relative; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .today-card::before {
      content: '✝';
      position: absolute; right: 2rem; top: 50%;
      transform: translateY(-50%);
      font-size: 9rem;
      color: rgba(201,150,58,0.05);
      pointer-events: none;
    }
    .today-label {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.5rem;
    }
    .today-reading {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem; line-height: 1.1;
      color: #fff; margin-bottom: 0.5rem;
    }
    .today-meta { font-size: 0.85rem; color: #777; margin-bottom: 1.5rem; }
    .today-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    /* ── BUTTONS ── */
    .btn {
      padding: 0.75rem 1.5rem;
      border: none; border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-weight: 700; font-size: 0.85rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-gold { background: var(--gold); color: var(--ink); }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-outline { background: none; border: 1.5px solid #444; color: #888; }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { background: #22753a; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-red:hover { background: #a32828; }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .done-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(26,92,42,0.25); border: 1px solid #2a7a3e;
      color: #5ec97a; padding: 0.5rem 1rem;
      border-radius: 20px; font-size: 0.85rem; font-weight: 700;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--parchment-dark);
      border-radius: 8px; padding: 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; color: var(--ink);
      margin-bottom: 1.2rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--parchment-dark);
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* ── STATS ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat-box {
      text-align: center; padding: 1rem;
      background: var(--parchment);
      border-radius: 4px; border: 1px solid var(--parchment-dark);
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; color: var(--gold); line-height: 1;
    }
    .stat-label {
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--ink-light); margin-top: 0.3rem;
    }

    /* ── PROGRESS BAR ── */
    .pbar-wrap { background: var(--parchment-dark); border-radius: 20px; height: 10px; overflow: hidden; margin-bottom: 0.4rem; }
    .pbar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 20px; transition: width 1s ease;
    }
    .pbar-label { font-size: 0.78rem; color: var(--ink-light); text-align: right; }

    /* ── CALENDAR ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
      gap: 3px; margin-top: 1rem;
    }
    .cal-day {
      aspect-ratio: 1; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700;
      cursor: pointer; transition: transform 0.15s;
      background: var(--parchment-dark); color: #bbb;
    }
    .cal-day:hover { transform: scale(1.25); z-index: 1; position: relative; }
    .cal-day.done { background: var(--green); color: #fff; }
    .cal-day.is-today { background: var(--gold); color: var(--ink); box-shadow: 0 0 0 2px var(--gold-light); }

    /* ── PLAN ROWS ── */
    .plan-row {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1rem; border-radius: 4px;
      cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid var(--parchment-dark);
    }
    .plan-row:last-child { border-bottom: none; }
    .plan-row:hover { background: var(--parchment); }
    .day-num { min-width: 38px; font-size: 0.68rem; font-weight: 700; color: #bbb; text-transform: uppercase; }
    .plan-reading { font-weight: 700; font-size: 0.92rem; flex: 1; }
    .plan-date { font-size: 0.78rem; color: #bbb; }
    .badge-done {
      background: var(--green); color: #fff;
      border-radius: 20px; padding: 0.12rem 0.55rem;
      font-size: 0.68rem; font-weight: 700;
    }

    /* ── BOOK PROGRESS ── */
    .book-item { margin-bottom: 0.9rem; }
    .book-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .book-name { font-weight: 700; font-size: 0.88rem; }
    .book-count { font-size: 0.78rem; color: var(--ink-light); }
    .mini-bar { background: var(--parchment-dark); height: 5px; border-radius: 10px; overflow: hidden; }
    .mini-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 10px; transition: width 0.8s; }

    /* ── FRIENDS ── */
    .friends-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .friend-card {
      background: var(--card); border: 1px solid var(--parchment-dark);
      border-radius: 6px; padding: 1.2rem;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .friend-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      object-fit: cover; margin-bottom: 0.75rem;
      border: 2px solid var(--gold);
    }
    .friend-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 0.2rem; }
    .friend-pct { font-size: 0.8rem; color: var(--ink-light); margin-bottom: 0.75rem; }

    /* ── SEARCH ── */
    .search-input {
      width: 100%; padding: 0.7rem 1rem;
      border: 1.5px solid var(--parchment-dark);
      border-radius: 4px;
      font-family: 'Lato', sans-serif; font-size: 0.9rem;
      background: var(--card); color: var(--ink);
      outline: none; margin-bottom: 1rem;
    }
    .search-input:focus { border-color: var(--gold); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,18,8,0.78);
      z-index: 200; display: flex;
      align-items: center; justify-content: center;
      padding: 1rem; backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--card); border-radius: 8px;
      width: 100%; max-width: 600px; max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      border-top: 3px solid var(--gold);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--parchment-dark);
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .modal-day-label { font-size: 0.68rem; color: var(--gold); font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; }
    .modal-close {
      background: none; border: none;
      font-size: 1.6rem; color: #aaa; cursor: pointer; line-height: 1; padding: 0.2rem;
    }
    .modal-close:hover { color: var(--ink); }
    .modal-body { padding: 1.5rem; }

    .form-label {
      display: block; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ink-light); margin-bottom: 0.4rem;
    }
    textarea.field {
      width: 100%; min-height: 110px;
      padding: 0.75rem 1rem; resize: vertical;
      border: 1.5px solid var(--parchment-dark); border-radius: 3px;
      font-family: 'Lato', sans-serif; font-size: 0.92rem;
      background: var(--parchment); color: var(--ink); outline: none;
    }
    textarea.field:focus { border-color: var(--gold); }

    .highlight-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .highlight-input {
      flex: 1; padding: 0.55rem 0.85rem;
      border: 1.5px solid var(--parchment-dark); border-radius: 3px;
      font-family: 'Lato', sans-serif; font-size: 0.88rem;
      background: var(--parchment); color: var(--ink); outline: none;
    }
    .highlight-input:focus { border-color: var(--gold); }
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 0.3rem; min-height: 28px; margin-top: 0.5rem; }
    .tag {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(201,150,58,0.12); border: 1px solid var(--gold);
      color: var(--ink-light); padding: 0.2rem 0.55rem;
      border-radius: 20px; font-size: 0.78rem;
    }
    .tag-del { background: none; border: none; cursor: pointer; color: var(--gold); font-size: 0.9rem; padding: 0; line-height: 1; }

    .divider { height: 1px; background: var(--parchment-dark); margin: 1.2rem 0; }

    .alert {
      padding: 0.75rem 1rem; border-radius: 4px;
      font-size: 0.88rem; margin-bottom: 1rem;
    }
    .alert-ok  { background: rgba(26,92,42,0.1); color: var(--green); border: 1px solid rgba(26,92,42,0.3); }
    .alert-err { background: rgba(139,32,32,0.1); color: var(--red); border: 1px solid rgba(139,32,32,0.3); }

    /* ── MOBILE NAV ── */
    #mobile-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--ink);
      justify-content: space-around;
      padding: 0.5rem 0;
      z-index: 100;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.3);
    }

    .loading-text { text-align: center; padding: 3rem; color: #aaa; font-style: italic; }

    @media (max-width: 640px) {
      .today-reading { font-size: 2rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      #header .nav-btn { display: none; }
      #mobile-nav { display: flex; }
      #main { padding: 1.5rem 1rem 5rem; }
    }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <span class="cross">✝</span>
  <p>Carregando...</p>
</div>

<!-- LOGIN -->

      Entrar com GitHub
    </button>

    <p id="login-error" class="error-msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header id="header">
    <div class="header-logo">✝ Bíblia 2026</div>
    <nav id="desktop-nav">
      <button class="nav-btn active" data-screen="home">Início</button>
      <button class="nav-btn" data-screen="progress">Progresso</button>
      <button class="nav-btn" data-screen="plan">Plano</button>
      <button class="nav-btn" data-screen="friends">Comunidade</button>
    </nav>
    <div class="user-chip" id="user-chip"></div>
    <button class="nav-btn" id="btn-logout" style="color:#666">Sair</button>
  </header>

  <main id="main"></main>

  <nav id="mobile-nav">
    <button class="nav-btn active" data-screen="home">Início</button>
    <button class="nav-btn" data-screen="progress">Progresso</button>
    <button class="nav-btn" data-screen="plan">Plano</button>
    <button class="nav-btn" data-screen="friends">Comunidade</button>
  </nav>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modal-box"></div>
</div>

const START = new Date(2026, 1, 19);
const PLAN = READINGS.map((r, i) => {
  const d = new Date(START);
  d.setDate(d.getDate() + i);
  return { day: i + 1, date: d.toISOString().split('T')[0], reading: r };
});

// ============================================================
// HELPERS
// ============================================================
const todayStr = () => new Date().toISOString().split('T')[0];
const fmtDate  = s => { if (!s) return ''; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; };
const todayEntry = () => PLAN.find(r => r.date === todayStr());
const bookOf = r => r.split(' ')[0];
const $ = id => document.getElementById(id);

// ============================================================
// STATE
// ============================================================
let STATE = { user: null, profile: null, completedDays: new Set(), readingsMap: {} };

// ============================================================
// SUPABASE DB
// ============================================================
async function loadUserReadings(userId) {
  const { data } = await sb.from('readings').select('*').eq('user_id', userId);
  STATE.completedDays = new Set();
  STATE.readingsMap = {};
  (data || []).forEach(r => {
    STATE.readingsMap[r.day] = r;
    if (r.completed) STATE.completedDays.add(r.day);
  });
}

async function upsertReading(day, payload) {
  const { data, error } = await sb.from('readings').upsert({
    user_id: STATE.user.id, day, ...payload
  }, { onConflict: 'user_id,day' }).select().single();
  if (!error && data) {
    STATE.readingsMap[day] = data;
    if (data.completed) STATE.completedDays.add(day);
    else STATE.completedDays.delete(day);
  }
  return { data, error };
}

async function getOtherProgress(userId) {
  const { data } = await sb.from('readings').select('day,completed').eq('user_id', userId).eq('completed', true);
  return (data || []).map(r => r.day);
}

async function getAllProfiles() {
  const { data } = await sb.from('profiles').select('*').neq('id', STATE.user.id);
  return data || [];
}

// ============================================================
// AUTH
// ============================================================
async function signIn(provider) {
  $('login-error').textContent = '';
  const { error } = await sb.auth.signInWithOAuth({
    provider,
    options: { redirectTo: window.location.href }
  });
  if (error) $('login-error').textContent = error.message;
}

async function signOut() {
  await sb.auth.signOut();
  STATE = { user: null, profile: null, completedDays: new Set(), readingsMap: {} };
  showLogin();
}

// ============================================================
// SCREENS
// ============================================================
function showSplash() {
  $('splash').classList.remove('hidden');
  $('login-screen').style.display = 'none';
  $('app').style.display = 'none';
}

function hideSplash() {
  setTimeout(() => $('splash').classList.add('hidden'), 400);
}

function showLogin() {
  hideSplash();
  $('login-screen').style.display = 'flex';
  $('app').style.display = 'none';
}

function showApp() {
  hideSplash();
  $('login-screen').style.display = 'none';
  $('app').style.display = 'block';

  // user chip
  const chip = $('user-chip');
  const name = STATE.profile?.full_name || STATE.user?.email || 'Usuário';
  const avatar = STATE.profile?.avatar_url;
  chip.innerHTML = avatar
    ? `<img src="${avatar}" alt="${name}" />${name.split(' ')[0]}`
    : name.split(' ')[0];

  renderScreen('home');
}

let currentScreen = 'home';
function renderScreen(screen) {
  currentScreen = screen;
  document.querySelectorAll('.nav-btn[data-screen]').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === screen);
  });
  const main = $('main');
  switch (screen) {
    case 'home':     main.innerHTML = renderHome(); break;
    case 'progress': main.innerHTML = renderProgress(); break;
    case 'plan':     main.innerHTML = renderPlan(); break;
    case 'friends':  renderFriends(); break;
  }
  bindScreenEvents(screen);
}

// ── HOME ──
function renderHome() {
  const te = todayEntry();
  const done = te && STATE.completedDays.has(te.day);
  const pct  = Math.round(STATE.completedDays.size / 365 * 100);

  const todayBlock = te ? `
    <div class="today-label">✦ Leitura de Hoje</div>
    <div class="today-reading">${te.reading}</div>
    <div class="today-meta">Dia ${te.day} de 365 &nbsp;·&nbsp; ${fmtDate(te.date)}</div>
    <div class="today-actions">
      ${done
        ? '<span class="done-badge">✓ Concluída hoje</span>'
        : `<button class="btn btn-gold" onclick="openModal(${te.day})">Abrir leitura</button>`
      }
      <button class="btn btn-outline" onclick="openModal(${te.day})">Ver anotações</button>
    </div>
  ` : '<p style="color:#888">Nenhuma leitura agendada para hoje.</p>';

  const upcoming = PLAN.filter(r => r.date >= todayStr()).slice(0, 7).map(e => `
    <div class="plan-row" onclick="openModal(${e.day})">
      <span class="day-num">Dia ${e.day}</span>
      <span class="plan-reading">${e.reading}</span>
      <span class="plan-date">${fmtDate(e.date)}</span>
      ${STATE.completedDays.has(e.day) ? '<span class="badge-done">✓</span>' : ''}
    </div>
  `).join('');

  return `
    <div class="today-card">${todayBlock}</div>

    <div class="card">
      <div class="section-title">📊 Meu Progresso</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num">${STATE.completedDays.size}</div><div class="stat-label">Lidas</div></div>
        <div class="stat-box"><div class="stat-num">${365 - STATE.completedDays.size}</div><div class="stat-label">Restantes</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Completo</div></div>
      </div>
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="pbar-label">${STATE.completedDays.size} de 365 dias</div>
    </div>

    <div class="section-title">📅 Próximas Leituras</div>
    <div class="card" style="padding:0;overflow:hidden">${upcoming}</div>
  `;
}

// ── PROGRESS ──
function renderProgress() {
  const pct = Math.round(STATE.completedDays.size / 365 * 100);
  const todayDay = todayEntry()?.day;

  const calDays = PLAN.map(e => {
    const done    = STATE.completedDays.has(e.day);
    const isToday = e.day === todayDay;
    const cls     = done ? 'done' : isToday ? 'is-today' : '';
    return `<div class="cal-day ${cls}" title="Dia ${e.day}: ${e.reading} (${fmtDate(e.date)})" onclick="openModal(${e.day})">${e.day}</div>`;
  }).join('');

  const books = [...new Set(PLAN.map(r => bookOf(r.reading)))];
  const bookRows = books.map(book => {
    const days = PLAN.filter(r => bookOf(r.reading) === book);
    const done = days.filter(r => STATE.completedDays.has(r.day)).length;
    const p    = Math.round(done / days.length * 100);
    return `
      <div class="book-item">
        <div class="book-header">
          <span class="book-name">${book}</span>
          <span class="book-count">${done}/${days.length}</span>
        </div>
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${p}%"></div></div>
      </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="section-title">🏆 Progresso Total</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num">${STATE.completedDays.size}</div><div class="stat-label">Dias lidos</div></div>
        <div class="stat-box"><div class="stat-num">${365 - STATE.completedDays.size}</div><div class="stat-label">Restantes</div></div>
        <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Completo</div></div>
      </div>
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="pbar-label" style="margin-bottom:1.5rem">${STATE.completedDays.size} de 365 dias</div>
      <div class="section-title" style="font-size:1rem">📆 Calendário</div>
      <div class="cal-grid">${calDays}</div>
    </div>
    <div class="card">
      <div class="section-title">📚 Por Livro</div>
      ${bookRows}
    </div>`;
}

// ── PLAN ──
function renderPlan(filter = '') {
  const rows = PLAN.filter(e =>
    e.reading.toLowerCase().includes(filter.toLowerCase()) || String(e.day).includes(filter)
  ).map(e => `
    <div class="plan-row" onclick="openModal(${e.day})">
      <span class="day-num">Dia ${e.day}</span>
      <span class="plan-reading">${e.reading}</span>
      <span class="plan-date">${fmtDate(e.date)}</span>
      ${STATE.completedDays.has(e.day) ? '<span class="badge-done">✓</span>' : ''}
    </div>`).join('');

  return `
    <div class="section-title">📖 Plano Completo</div>
    <input class="search-input" id="plan-search" placeholder="Buscar livro ou dia..." value="${filter}" />
    <div class="card" style="padding:0;overflow:hidden">${rows}</div>`;
}

function bindScreenEvents(screen) {
  if (screen === 'plan') {
    const inp = $('plan-search');
    if (inp) inp.addEventListener('input', () => {
      $('main').innerHTML = renderPlan(inp.value);
      bindScreenEvents('plan');
    });
  }
}

// ── FRIENDS ──
async function renderFriends() {
  $('main').innerHTML = '<div class="loading-text">Carregando comunidade...</div>';
  const profiles = await getAllProfiles();

  const cards = profiles.length === 0
    ? '<p style="color:#aaa;font-size:.9rem">Nenhum outro usuário encontrado ainda.</p>'
    : profiles.map(p => `
      <div class="friend-card">
        ${p.avatar_url ? `<img class="friend-avatar" src="${p.avatar_url}" alt="${p.full_name}" />` : ''}
        <div class="friend-name">${p.full_name || p.username || 'Usuário'}</div>
        <div class="friend-pct" id="fpct-${p.id}">Carregando...</div>
        <div class="mini-bar"><div class="mini-bar-fill" id="fbar-${p.id}" style="width:0%"></div></div>
      </div>`).join('');

  $('main').innerHTML = `
    <div class="section-title">👥 Comunidade de Leitura</div>
    <div class="friends-grid">${cards}</div>`;

  // Load each friend's progress async
  for (const p of profiles) {
    getOtherProgress(p.id).then(days => {
      const pct = Math.round(days.length / 365 * 100);
      const pctEl = $('fpct-' + p.id);
      const barEl = $('fbar-' + p.id);
      if (pctEl) pctEl.textContent = `${days.length}/365 dias · ${pct}%`;
      if (barEl) barEl.style.width = pct + '%';
    });
  }
}

// ============================================================
// MODAL DE LEITURA
// ============================================================
window.openModal = async function(day) {
  const entry = PLAN[day - 1];
  if (!entry) return;

  const overlay = $('modal-overlay');
  const box     = $('modal-box');
  overlay.style.display = 'flex';

  const saved = STATE.readingsMap[day] || {};
  const completed  = saved.completed || false;
  const comment    = saved.comment || '';
  const highlights = saved.highlights || [];

  box.innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-day-label">Dia ${entry.day} — ${fmtDate(entry.date)}</div>
        <div class="modal-title">${entry.reading}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="modal-alert"></div>
      <div style="display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap">
        ${completed
          ? '<span class="done-badge">✓ Leitura concluída</span>'
          : `<button class="btn btn-green btn-sm" id="btn-mark-done">✓ Marcar como lida</button>`
        }
        ${completed ? `<button class="btn btn-outline btn-sm" id="btn-unmark">Desmarcar</button>` : ''}
      </div>

      <div style="margin-bottom:1.2rem">
        <label class="form-label">📝 Comentário pessoal</label>
        <textarea class="field" id="modal-comment" placeholder="Reflexões, aprendizados, anotações...">${comment}</textarea>
      </div>

      <div style="margin-bottom:1rem">
        <label class="form-label">✨ Trechos em destaque</label>
        <div class="highlight-row">
          <input class="highlight-input" id="hl-input" placeholder="Ex: Gn 1:1 — No princípio..." />
          <button class="btn btn-outline btn-sm" id="btn-add-hl">+ Adicionar</button>
        </div>
        <div class="tags-wrap" id="tags-wrap">
          ${highlights.length === 0
            ? '<span style="font-size:.8rem;color:#aaa;font-style:italic">Nenhum trecho ainda</span>'
            : highlights.map((h, i) => `
                <span class="tag">📖 ${h}
                  <button class="tag-del" onclick="removeHL(${i})">×</button>
                </span>`).join('')
          }
        </div>
      </div>

      <div class="divider"></div>
      <button class="btn btn-gold" id="btn-save" style="width:100%">💾 Salvar anotações</button>
    </div>`;

  // State local do modal
  let localHL = [...highlights];

  window.removeHL = (i) => {
    localHL.splice(i, 1);
    refreshTags(localHL);
  };

  function refreshTags(hls) {
    const wrap = $('tags-wrap');
    if (!wrap) return;
    wrap.innerHTML = hls.length === 0
      ? '<span style="font-size:.8rem;color:#aaa;font-style:italic">Nenhum trecho ainda</span>'
      : hls.map((h, i) => `<span class="tag">📖 ${h}<button class="tag-del" onclick="removeHL(${i})">×</button></span>`).join('');
  }

  const addHLBtn = $('btn-add-hl');
  if (addHLBtn) addHLBtn.onclick = () => {
    const inp = $('hl-input');
    if (!inp.value.trim()) return;
    localHL.push(inp.value.trim());
    inp.value = '';
    refreshTags(localHL);
  };

  const hlInput = $('hl-input');
  if (hlInput) hlInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addHLBtn.click();
  });

  async function doSave(markCompleted) {
    const btn = $('btn-save');
    if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
    const payload = {
      completed: markCompleted !== undefined ? markCompleted : completed,
      completed_at: markCompleted ? new Date().toISOString() : (saved.completed_at || null),
      comment: ($('modal-comment')?.value || '').trim(),
      highlights: localHL,
    };
    const { error } = await upsertReading(day, payload);
    const alert = $('modal-alert');
    if (alert) {
      alert.className = 'alert ' + (error ? 'alert-err' : 'alert-ok');
      alert.textContent = error ? '❌ Erro ao salvar: ' + error.message : '✓ Salvo com sucesso!';
      setTimeout(() => { if (alert) alert.textContent = ''; }, 2500);
    }
    if (btn) { btn.disabled = false; btn.textContent = '💾 Salvar anotações'; }
    if (!error && currentScreen === 'home') renderScreen('home');
  }

  const saveBtn = $('btn-save');
  if (saveBtn) saveBtn.onclick = () => doSave(undefined);

  const doneBtn = $('btn-mark-done');
  if (doneBtn) doneBtn.onclick = async () => {
    await doSave(true);
    openModal(day);
  };

  const unmarkBtn = $('btn-unmark');
  if (unmarkBtn) unmarkBtn.onclick = async () => {
    await doSave(false);
    openModal(day);
  };

  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
};

window.closeModal = function() {
  $('modal-overlay').style.display = 'none';
  if (currentScreen !== 'friends') renderScreen(currentScreen);
};

// ============================================================
// NAV
// ============================================================
document.querySelectorAll('.nav-btn[data-screen]').forEach(btn => {
  btn.addEventListener('click', () => renderScreen(btn.dataset.screen));
});

$('btn-google').addEventListener('click', () => signIn('google'));
$('btn-github').addEventListener('click', () => signIn('github'));
$('btn-logout').addEventListener('click', signOut);

// ============================================================
// INIT
// ============================================================
(async () => {
  showSplash();

  const { data: { session } } = await sb.auth.getSession();

  if (session?.user) {
    STATE.user = session.user;
    const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
    STATE.profile = profile;
    await loadUserReadings(session.user.id);
    showApp();
  } else {
    showLogin();
  }

  // Listen for auth changes (OAuth redirect)
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      STATE.user = session.user;
      const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      STATE.profile = profile;
      await loadUserReadings(session.user.id);
      showApp();
    } else if (event === 'SIGNED_OUT') {
      showLogin();
    }
  });
})();
