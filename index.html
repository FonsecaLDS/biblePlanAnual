<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bíblia 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --bg2: #16161d;
      --bg3: #1e1e28;
      --surface: rgba(255,255,255,0.05);
      --surface2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --gold: #d4a843;
      --gold2: #f0c060;
      --gold-dim: rgba(212,168,67,0.15);
      --gold-glow: rgba(212,168,67,0.25);
      --text: #f0ece4;
      --text2: #9a9490;
      --text3: #5a5650;
      --green: #2ecc71;
      --green-dim: rgba(46,204,113,0.15);
      --red: #e74c3c;
      --red-dim: rgba(231,76,60,0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --nav-h: 72px;
      --header-h: 60px;
    }

    html { background: var(--bg); }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
      transition: opacity 0.5s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-icon {
      width: 80px; height: 80px;
      background: var(--gold-dim);
      border: 1px solid var(--gold);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--gold);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(.95)} }
    #splash p { color: var(--text2); font-size: .85rem; letter-spacing: .2em; text-transform: uppercase; }

    #login-screen {
      min-height: 100vh; min-height: 100dvh;
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
      background: radial-gradient(ellipse at 50% 0%, rgba(212,168,67,.12) 0%, transparent 60%), var(--bg);
    }
    .login-card {
      width: 100%; max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
    }
    .login-brand { text-align: center; margin-bottom: 2.5rem; }
    .brand-icon {
      width: 64px; height: 64px; margin: 0 auto 1rem;
      background: var(--gold-dim);
      border: 1px solid rgba(212,168,67,.4);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; color: var(--gold);
    }
    .login-brand h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--text); margin-bottom: .3rem; }
    .login-brand p { color: var(--text2); font-size: .85rem; letter-spacing: .15em; text-transform: uppercase; }
    .login-sub { color: var(--text2); font-size: .9rem; text-align: center; line-height: 1.6; margin-bottom: 2rem; }

    .oauth-btn {
      width: 100%; padding: 1rem 1.2rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .75rem;
      transition: all .2s; margin-bottom: .75rem;
    }
    .oauth-btn:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.22); transform: translateY(-1px); }
    .oauth-btn i { font-size: 1.1rem; }
    .oauth-btn.google i { color: #ea4335; }
    .oauth-btn.github i { color: #ccc; }
    #login-error { color: var(--red); font-size: .85rem; text-align: center; margin-top: 1rem; min-height: 20px; }

    #app { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: rgba(15,15,19,.85);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 1.25rem; gap: .75rem;
    }
    .header-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem; color: var(--gold);
      margin-right: auto;
      display: flex; align-items: center; gap: .5rem;
    }
    .avatar-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--gold); overflow: hidden;
      background: var(--gold-dim);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .9rem; color: var(--gold); flex-shrink: 0;
    }
    .avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
    .logout-btn {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--border2); background: var(--surface);
      color: var(--text2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .9rem; transition: all .2s;
    }
    .logout-btn:hover { color: var(--red); border-color: var(--red); }

    #desktop-nav { display: flex; gap: .25rem; }
    .dnav-btn {
      background: none; border: none;
      padding: .45rem .85rem; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem; font-weight: 600;
      color: var(--text2); cursor: pointer;
      transition: all .2s; display: flex; align-items: center; gap: .4rem;
    }
    .dnav-btn:hover { color: var(--text); background: var(--surface2); }
    .dnav-btn.active { color: var(--gold); background: var(--gold-dim); }

    #main {
      margin-top: var(--header-h);
      padding: 1.5rem 1.25rem calc(var(--nav-h) + 1.5rem);
      max-width: 680px; margin-left: auto; margin-right: auto; width: 100%;
    }

    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(22,22,29,.9);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bnav-btn {
      flex: 1; background: none; border: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      color: var(--text3); cursor: pointer;
      padding: .5rem .25rem;
      transition: all .2s; font-family: 'DM Sans', sans-serif;
    }
    .bnav-btn i { font-size: 1.2rem; transition: all .2s; }
    .bnav-btn span { font-size: .65rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
    .bnav-btn.active { color: var(--gold); }
    .bnav-btn.active i { transform: translateY(-2px); filter: drop-shadow(0 0 6px var(--gold)); }

    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.4rem; margin-bottom: 1rem;
    }

    .today-hero {
      background: linear-gradient(135deg, #1a1508 0%, #0f0f13 100%);
      border: 1px solid rgba(212,168,67,.25); border-radius: 20px;
      padding: 1.8rem 1.5rem; margin-bottom: 1rem;
      position: relative; overflow: hidden;
    }
    .today-hero::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(212,168,67,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .today-chip {
      display: inline-flex; align-items: center; gap: .4rem;
      background: var(--gold-dim); border: 1px solid rgba(212,168,67,.3);
      color: var(--gold); padding: .3rem .75rem; border-radius: 20px;
      font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: .9rem;
    }
    .today-reading {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem; line-height: 1.15; color: #fff; margin-bottom: .4rem;
    }
    .today-meta { color: var(--text2); font-size: .85rem; margin-bottom: 1.4rem; }
    .today-actions { display: flex; gap: .75rem; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .7rem 1.3rem; border: none; border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: .85rem;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn i { font-size: .85rem; }
    .btn-gold { background: var(--gold); color: #0f0f13; }
    .btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }
    .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,.12); }
    .btn-green { background: var(--green-dim); border: 1px solid rgba(46,204,113,.3); color: var(--green); }
    .btn-green:hover { background: rgba(46,204,113,.25); }
    .btn-sm { padding: .5rem 1rem; font-size: .8rem; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

    .done-pill {
      display: inline-flex; align-items: center; gap: .45rem;
      background: var(--green-dim); border: 1px solid rgba(46,204,113,.3);
      color: var(--green); padding: .6rem 1.1rem;
      border-radius: var(--radius-sm); font-size: .85rem; font-weight: 600;
    }

    .sec-title {
      font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--text);
      margin-bottom: 1rem; display: flex; align-items: center; gap: .6rem;
    }
    .sec-title i { color: var(--gold); font-size: 1rem; }

    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; margin-bottom: 1.2rem; }
    .stat-cell {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 1rem .75rem; text-align: center;
    }
    .stat-n { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--gold); line-height: 1; }
    .stat-l { font-size: .68rem; color: var(--text2); text-transform: uppercase; letter-spacing: .1em; margin-top: .25rem; }

    .pbar { background: rgba(255,255,255,.07); border-radius: 20px; height: 8px; overflow: hidden; margin-bottom: .4rem; }
    .pbar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 20px; transition: width 1s ease; }
    .pbar-lbl { font-size: .78rem; color: var(--text2); text-align: right; }

    .list-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
    .plan-row {
      display: flex; align-items: center; gap: .9rem;
      padding: .9rem 1.1rem; cursor: pointer; transition: background .15s;
      border-bottom: 1px solid var(--border);
    }
    .plan-row:last-child { border-bottom: none; }
    .plan-row:hover { background: var(--surface2); }
    .plan-row:active { background: var(--surface); }
    .day-badge {
      min-width: 36px; height: 36px; background: var(--surface);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700; color: var(--text3); flex-shrink: 0;
    }
    .day-badge.done-bg { background: var(--green-dim); color: var(--green); }
    .day-badge.today-bg { background: var(--gold-dim); color: var(--gold); }
    .row-reading { font-weight: 600; font-size: .92rem; flex: 1; }
    .row-date { font-size: .78rem; color: var(--text3); flex-shrink: 0; }
    .row-check { color: var(--green); font-size: .85rem; flex-shrink: 0; }

    .cal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(30px,1fr)); gap: 3px; margin-top: 1rem; }
    .cal-d {
      aspect-ratio: 1; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .58rem; font-weight: 700; cursor: pointer; transition: transform .15s;
      background: var(--surface); color: var(--text3);
    }
    .cal-d:hover { transform: scale(1.3); z-index: 1; position: relative; }
    .cal-d.done { background: var(--green-dim); color: var(--green); }
    .cal-d.today { background: var(--gold); color: #0f0f13; box-shadow: 0 0 10px var(--gold-glow); }

    .book-row { margin-bottom: .9rem; }
    .book-hdr { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .book-name { font-size: .85rem; font-weight: 600; }
    .book-ct { font-size: .75rem; color: var(--text2); }
    .mini-bar { background: rgba(255,255,255,.06); height: 5px; border-radius: 10px; overflow: hidden; }
    .mini-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 10px; transition: width .8s; }

    .friends-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: .75rem; }
    .friend-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; }
    .friend-top { display: flex; align-items: center; gap: .75rem; margin-bottom: .9rem; }
    .f-avatar {
      width: 42px; height: 42px; border-radius: 14px;
      border: 1.5px solid var(--gold); background: var(--gold-dim); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1rem; flex-shrink: 0;
    }
    .f-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .f-name { font-weight: 700; font-size: .95rem; }
    .f-pct { font-size: .78rem; color: var(--text2); }

    .search-wrap { position: relative; margin-bottom: 1rem; }
    .search-wrap i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .9rem; }
    .search-input {
      width: 100%; padding: .75rem 1rem .75rem 2.5rem;
      border: 1px solid var(--border2); border-radius: var(--radius-sm);
      background: var(--bg2); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--text3); }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.75); backdrop-filter: blur(8px);
      display: none; align-items: flex-end; justify-content: center;
    }
    @media (min-width: 600px) { .modal-overlay { align-items: center; padding: 1rem; } }
    .modal-sheet {
      background: var(--bg2); border: 1px solid var(--border2);
      width: 100%; max-width: 580px; max-height: 92dvh; overflow-y: auto;
      border-radius: 24px 24px 0 0;
      animation: sheetUp .3s cubic-bezier(.34,1.56,.64,1);
    }
    @media (min-width: 600px) { .modal-sheet { border-radius: 24px; animation: modalIn .25s ease; } }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes modalIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border2); margin: .9rem auto .5rem; }
    .modal-header {
      padding: .5rem 1.5rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .modal-day { font-size: .72rem; color: var(--gold); font-weight: 700; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 4px; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; }
    .modal-close {
      background: var(--surface); border: 1px solid var(--border2);
      width: 32px; height: 32px; border-radius: 50%;
      color: var(--text2); cursor: pointer; font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
    }
    .modal-close:hover { color: var(--text); background: var(--surface2); }
    .modal-body { padding: 1.5rem; }

    .form-lbl { display: block; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); margin-bottom: .45rem; }
    .field {
      width: 100%; padding: .8rem 1rem;
      border: 1px solid var(--border2); border-radius: var(--radius-sm);
      background: var(--bg3); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .92rem;
      outline: none; transition: border-color .2s;
    }
    .field:focus { border-color: var(--gold); }
    textarea.field { min-height: 110px; resize: vertical; }

    .hl-row { display: flex; gap: .5rem; margin-bottom: .6rem; }
    .hl-input {
      flex: 1; padding: .65rem .9rem;
      border: 1px solid var(--border2); border-radius: var(--radius-sm);
      background: var(--bg3); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      outline: none; transition: border-color .2s;
    }
    .hl-input:focus { border-color: var(--gold); }
    .tags-wrap { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .6rem; min-height: 28px; }
    .tag {
      display: inline-flex; align-items: center; gap: .35rem;
      background: var(--gold-dim); border: 1px solid rgba(212,168,67,.3);
      color: var(--gold); padding: .25rem .65rem;
      border-radius: 20px; font-size: .78rem; font-weight: 500;
    }
    .tag-x { background: none; border: none; cursor: pointer; color: var(--gold); opacity: .7; font-size: .85rem; padding: 0; line-height: 1; }
    .tag-x:hover { opacity: 1; }
    .empty-tag { font-size: .8rem; color: var(--text3); font-style: italic; }

    .divider { height: 1px; background: var(--border); margin: 1.2rem 0; }
    .alert { padding: .75rem 1rem; border-radius: var(--radius-sm); font-size: .88rem; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
    .alert-ok  { background: var(--green-dim); border: 1px solid rgba(46,204,113,.3); color: var(--green); }
    .alert-err { background: var(--red-dim);   border: 1px solid rgba(231,76,60,.3);  color: var(--red); }

    .loading-state { text-align: center; padding: 3rem 1rem; color: var(--text2); }
    .loading-state i { font-size: 2rem; color: var(--text3); margin-bottom: 1rem; display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .fa-spin-custom { animation: spin 1s linear infinite; }

    @media (max-width: 600px) {
      #desktop-nav { display: none; }
      .today-reading { font-size: 1.8rem; }
      .stats-row { grid-template-columns: repeat(2,1fr); }
    }
    @media (min-width: 601px) { #bottom-nav { display: none; } }
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-icon"><i class="fa-solid fa-cross"></i></div>
  <p>Bíblia 2026</p>
</div>

<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon"><i class="fa-solid fa-book-bible"></i></div>
      <h1>Bíblia 2026</h1>
      <p>Plano de Leitura Anual</p>
    </div>
    <p class="login-sub">Entre com sua conta para acompanhar seu progresso em qualquer dispositivo.</p>
    <button class="oauth-btn google" id="btn-google"><i class="fa-brands fa-google"></i> Entrar com Google</button>
    <button class="oauth-btn github" id="btn-github"><i class="fa-brands fa-github"></i> Entrar com GitHub</button>
    <p id="login-error"></p>
  </div>
</div>

<div id="app">
  <header id="header">
    <div class="header-logo"><i class="fa-solid fa-cross"></i> Bíblia 2026</div>
    <nav id="desktop-nav">
      <button class="dnav-btn active" data-screen="home"><i class="fa-solid fa-house"></i> Início</button>
      <button class="dnav-btn" data-screen="progress"><i class="fa-solid fa-chart-line"></i> Progresso</button>
      <button class="dnav-btn" data-screen="plan"><i class="fa-solid fa-list"></i> Plano</button>
      <button class="dnav-btn" data-screen="friends"><i class="fa-solid fa-users"></i> Comunidade</button>
    </nav>
    <div class="avatar-btn" id="user-avatar"><i class="fa-solid fa-user"></i></div>
    <button class="logout-btn" id="btn-logout" title="Sair"><i class="fa-solid fa-right-from-bracket"></i></button>
  </header>

  <main id="main"></main>

  <nav id="bottom-nav">
    <button class="bnav-btn active" data-screen="home"><i class="fa-solid fa-house"></i><span>Início</span></button>
    <button class="bnav-btn" data-screen="progress"><i class="fa-solid fa-chart-line"></i><span>Progresso</span></button>
    <button class="bnav-btn" data-screen="plan"><i class="fa-solid fa-list"></i><span>Plano</span></button>
    <button class="bnav-btn" data-screen="friends"><i class="fa-solid fa-users"></i><span>Comunidade</span></button>
  </nav>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://ogzzgiyanopbiajpstnu.supabase.co';

const START = new Date(2026, 2, 18);
const PLAN  = READINGS.map((r, i) => {
  const d = new Date(START); d.setDate(d.getDate() + i);
  return { day: i + 1, date: d.toISOString().split('T')[0], reading: r };
});

const todayStr   = () => new Date().toISOString().split('T')[0];
const fmtDate    = s => { if (!s) return ''; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; };
const todayEntry = () => PLAN.find(r => r.date === todayStr());
const bookOf     = r => r.split(' ')[0];
const $          = id => document.getElementById(id);

let S = { user: null, profile: null, completedDays: new Set(), readingsMap: {} };
let currentScreen = 'home';

async function loadReadings(uid) {
  const { data } = await sb.from('readings').select('*').eq('user_id', uid);
  S.completedDays = new Set(); S.readingsMap = {};
  (data || []).forEach(r => { S.readingsMap[r.day] = r; if (r.completed) S.completedDays.add(r.day); });
}

async function upsertReading(day, payload) {
  const { data, error } = await sb.from('readings')
    .upsert({ user_id: S.user.id, day, ...payload }, { onConflict: 'user_id,day' })
    .select().single();
  if (!error && data) { S.readingsMap[day] = data; data.completed ? S.completedDays.add(day) : S.completedDays.delete(day); }
  return { data, error };
}

// ── AUTH ──
async function signIn(provider) {
  $('login-error').textContent = '';
  const { error } = await sb.auth.signInWithOAuth({
    provider,
    options: { redirectTo: REDIRECT_URL }
  });
  if (error) $('login-error').textContent = error.message;
}
async function signOut() {
  await sb.auth.signOut();
  S = { user: null, profile: null, completedDays: new Set(), readingsMap: {} };
  showLogin();
}

// ── DISPLAY ──
function hideSplash() { setTimeout(() => $('splash').classList.add('hide'), 300); }
function showLogin() { hideSplash(); $('login-screen').style.display = 'flex'; $('app').style.display = 'none'; }
async function showApp() {
  hideSplash();
  $('login-screen').style.display = 'none';
  $('app').style.display = 'flex';
  $('app').style.flexDirection = 'column';
  const av = $('user-avatar');
  if (S.profile?.avatar_url) av.innerHTML = `<img src="${S.profile.avatar_url}" alt="avatar" />`;
  renderScreen('home');
}

function setActiveNav(screen) {
  document.querySelectorAll('[data-screen]').forEach(b => b.classList.toggle('active', b.dataset.screen === screen));
}

function renderScreen(screen) {
  currentScreen = screen; setActiveNav(screen);
  const m = $('main');
  if      (screen === 'home')     m.innerHTML = renderHome();
  else if (screen === 'progress') m.innerHTML = renderProgress();
  else if (screen === 'plan')     { m.innerHTML = renderPlan(); bindPlanSearch(); }
  else if (screen === 'friends')  { m.innerHTML = loadingHTML(); renderFriends(); }
}

document.querySelectorAll('[data-screen]').forEach(b => b.addEventListener('click', () => renderScreen(b.dataset.screen)));
$('btn-logout').addEventListener('click', signOut);
$('btn-google').addEventListener('click', () => signIn('google'));
$('btn-github').addEventListener('click', () => signIn('github'));

// ── SCREENS ──
function renderHome() {
  const te = todayEntry(); const done = te && S.completedDays.has(te.day);
  const pct = Math.round(S.completedDays.size / 365 * 100);
  const heroHTML = te ? `
    <div class="today-chip"><i class="fa-solid fa-book-open-reader"></i> Leitura de Hoje</div>
    <div class="today-reading">${te.reading}</div>
    <div class="today-meta">Dia ${te.day} de 365 &nbsp;·&nbsp; ${fmtDate(te.date)}</div>
    <div class="today-actions">
      ${done ? '<span class="done-pill"><i class="fa-solid fa-circle-check"></i> Concluída hoje</span>'
             : `<button class="btn btn-gold" onclick="openModal(${te.day})"><i class="fa-solid fa-book-open"></i> Abrir leitura</button>`}
      <button class="btn btn-ghost" onclick="openModal(${te.day})"><i class="fa-regular fa-note-sticky"></i> Anotações</button>
    </div>` : '<p style="color:var(--text2)">Nenhuma leitura agendada para hoje.</p>';

  const upcoming = PLAN.filter(r => r.date >= todayStr()).slice(0, 7).map(e => {
    const isDone = S.completedDays.has(e.day); const isToday = e.date === todayStr();
    return `<div class="plan-row" onclick="openModal(${e.day})">
      <div class="day-badge ${isDone ? 'done-bg' : isToday ? 'today-bg' : ''}">${e.day}</div>
      <span class="row-reading">${e.reading}</span>
      <span class="row-date">${fmtDate(e.date)}</span>
      ${isDone ? '<i class="fa-solid fa-circle-check row-check"></i>' : ''}
    </div>`;
  }).join('');

  return `
    <div class="today-hero">${heroHTML}</div>
    <div class="card">
      <div class="sec-title"><i class="fa-solid fa-chart-simple"></i> Meu Progresso</div>
      <div class="stats-row">
        <div class="stat-cell"><div class="stat-n">${S.completedDays.size}</div><div class="stat-l">Lidas</div></div>
        <div class="stat-cell"><div class="stat-n">${365 - S.completedDays.size}</div><div class="stat-l">Restantes</div></div>
        <div class="stat-cell"><div class="stat-n">${pct}%</div><div class="stat-l">Completo</div></div>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="pbar-lbl">${S.completedDays.size} de 365 dias</div>
    </div>
    <div class="sec-title"><i class="fa-regular fa-calendar"></i> Próximas Leituras</div>
    <div class="list-card">${upcoming}</div>`;
}

function renderProgress() {
  const pct = Math.round(S.completedDays.size / 365 * 100);
  const todayDay = todayEntry()?.day;
  const calHTML = PLAN.map(e => {
    const cls = S.completedDays.has(e.day) ? 'done' : e.day === todayDay ? 'today' : '';
    return `<div class="cal-d ${cls}" title="Dia ${e.day}: ${e.reading}" onclick="openModal(${e.day})">${e.day}</div>`;
  }).join('');
  const books = [...new Set(PLAN.map(r => bookOf(r.reading)))];
  const bookHTML = books.map(bk => {
    const days = PLAN.filter(r => bookOf(r.reading) === bk);
    const done = days.filter(r => S.completedDays.has(r.day)).length;
    const p = Math.round(done / days.length * 100);
    return `<div class="book-row">
      <div class="book-hdr"><span class="book-name">${bk}</span><span class="book-ct">${done}/${days.length}</span></div>
      <div class="mini-bar"><div class="mini-fill" style="width:${p}%"></div></div>
    </div>`;
  }).join('');
  return `
    <div class="card">
      <div class="sec-title"><i class="fa-solid fa-trophy"></i> Progresso Total</div>
      <div class="stats-row">
        <div class="stat-cell"><div class="stat-n">${S.completedDays.size}</div><div class="stat-l">Lidas</div></div>
        <div class="stat-cell"><div class="stat-n">${365 - S.completedDays.size}</div><div class="stat-l">Restantes</div></div>
        <div class="stat-cell"><div class="stat-n">${pct}%</div><div class="stat-l">Completo</div></div>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="pbar-lbl" style="margin-bottom:1.5rem">${S.completedDays.size} de 365 dias</div>
      <div class="sec-title" style="font-size:1rem"><i class="fa-regular fa-calendar-days"></i> Calendário</div>
      <div class="cal-grid">${calHTML}</div>
    </div>
    <div class="card"><div class="sec-title"><i class="fa-solid fa-book-bible"></i> Por Livro</div>${bookHTML}</div>`;
}

function renderPlan(filter = '') {
  const rows = PLAN.filter(e => e.reading.toLowerCase().includes(filter.toLowerCase()) || String(e.day).includes(filter))
    .map(e => {
      const done = S.completedDays.has(e.day); const isToday = e.date === todayStr();
      return `<div class="plan-row" onclick="openModal(${e.day})">
        <div class="day-badge ${done ? 'done-bg' : isToday ? 'today-bg' : ''}">${e.day}</div>
        <span class="row-reading">${e.reading}</span>
        <span class="row-date">${fmtDate(e.date)}</span>
        ${done ? '<i class="fa-solid fa-circle-check row-check"></i>' : ''}
      </div>`;
    }).join('');
  return `
    <div class="sec-title"><i class="fa-solid fa-list-ol"></i> Plano Completo</div>
    <div class="search-wrap"><i class="fa-solid fa-magnifying-glass"></i>
      <input class="search-input" id="plan-search" placeholder="Buscar livro ou dia..." value="${filter}" /></div>
    <div class="list-card">${rows}</div>`;
}
function bindPlanSearch() {
  const inp = $('plan-search');
  if (!inp) return;
  inp.addEventListener('input', () => { $('main').innerHTML = renderPlan(inp.value); bindPlanSearch(); });
}

function loadingHTML() {
  return `<div class="loading-state"><i class="fa-solid fa-spinner fa-spin-custom"></i><p>Carregando...</p></div>`;
}

async function renderFriends() {
  const { data: profiles } = await sb.from('profiles').select('*').neq('id', S.user.id);
  const list = profiles || [];
  if (!list.length) {
    $('main').innerHTML = `<div class="sec-title"><i class="fa-solid fa-users"></i> Comunidade</div>
      <div class="card" style="text-align:center;color:var(--text2);padding:2.5rem">
        <i class="fa-solid fa-user-group" style="font-size:2rem;margin-bottom:.75rem;display:block;opacity:.3"></i>
        Nenhum outro usuário encontrado ainda.</div>`;
    return;
  }
  const cards = list.map(p => `
    <div class="friend-card">
      <div class="friend-top">
        <div class="f-avatar">${p.avatar_url ? `<img src="${p.avatar_url}" alt="" />` : '<i class="fa-solid fa-user"></i>'}</div>
        <div><div class="f-name">${p.full_name || 'Usuário'}</div>
          <div class="f-pct" id="fp-${p.id}"><i class="fa-solid fa-spinner fa-spin-custom"></i></div></div>
      </div>
      <div class="mini-bar"><div class="mini-fill" id="fb-${p.id}" style="width:0%"></div></div>
    </div>`).join('');
  $('main').innerHTML = `<div class="sec-title"><i class="fa-solid fa-users"></i> Comunidade</div>
    <div class="friends-grid">${cards}</div>`;
  for (const p of list) {
    sb.from('readings').select('day').eq('user_id', p.id).eq('completed', true).then(({ data }) => {
      const n = (data || []).length; const pct = Math.round(n / 365 * 100);
      const el = $('fp-' + p.id); const bar = $('fb-' + p.id);
      if (el)  el.textContent  = `${n}/365 dias · ${pct}%`;
      if (bar) bar.style.width = pct + '%';
    });
  }
}

// ── MODAL ──
window.openModal = function(day) {
  const entry = PLAN[day - 1]; if (!entry) return;
  const saved = S.readingsMap[day] || {};
  let localHL = [...(saved.highlights || [])];
  let completed = saved.completed || false;

  const sheet = $('modal-sheet');
  sheet.innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-day">Dia ${entry.day} — ${fmtDate(entry.date)}</div>
        <div class="modal-title">${entry.reading}</div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div id="m-alert"></div>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.4rem" id="m-status">${renderStatusBtns(completed)}</div>
      <div style="margin-bottom:1.2rem">
        <label class="form-lbl"><i class="fa-regular fa-note-sticky"></i> Comentário pessoal</label>
        <textarea class="field" id="m-comment" placeholder="Reflexões, aprendizados, anotações...">${saved.comment || ''}</textarea>
      </div>
      <div style="margin-bottom:1rem">
        <label class="form-lbl"><i class="fa-solid fa-highlighter"></i> Trechos em destaque</label>
        <div class="hl-row">
          <input class="hl-input" id="m-hl" placeholder="Ex: Gn 1:1 — No princípio..." />
          <button class="btn btn-ghost btn-sm" id="m-add-hl"><i class="fa-solid fa-plus"></i> Add</button>
        </div>
        <div class="tags-wrap" id="m-tags">${renderTags(localHL)}</div>
      </div>
      <div class="divider"></div>
      <button class="btn btn-gold" id="m-save" style="width:100%"><i class="fa-solid fa-floppy-disk"></i> Salvar anotações</button>
    </div>`;

  $('modal-overlay').style.display = 'flex';
  window._removeHL = i => { localHL.splice(i,1); $('m-tags').innerHTML = renderTags(localHL); };

  const addHL = () => {
    const inp = $('m-hl'); if (!inp.value.trim()) return;
    localHL.push(inp.value.trim()); inp.value = '';
    $('m-tags').innerHTML = renderTags(localHL);
  };
  $('m-add-hl').onclick = addHL;
  $('m-hl').addEventListener('keydown', e => e.key === 'Enter' && addHL());

  async function doSave(forceCompleted) {
    const btn = $('m-save');
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin-custom"></i> Salvando...';
    const newCompleted = forceCompleted !== undefined ? forceCompleted : completed;
    const { error } = await upsertReading(day, {
      completed: newCompleted,
      completed_at: newCompleted ? new Date().toISOString() : (saved.completed_at || null),
      comment: $('m-comment')?.value.trim() || '',
      highlights: localHL,
    });
    const al = $('m-alert');
    al.className = 'alert ' + (error ? 'alert-err' : 'alert-ok');
    al.innerHTML = error
      ? `<i class="fa-solid fa-triangle-exclamation"></i> Erro: ${error.message}`
      : `<i class="fa-solid fa-circle-check"></i> Salvo com sucesso!`;
    setTimeout(() => { if (al) al.innerHTML = ''; }, 2500);
    btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar anotações';
    if (!error) {
      completed = newCompleted;
      $('m-status').innerHTML = renderStatusBtns(completed);
      bindStatusBtns(doSave);
      if (currentScreen === 'home') renderScreen('home');
    }
  }
  $('m-save').onclick = () => doSave(undefined);
  bindStatusBtns(doSave);
  $('modal-overlay').onclick = e => { if (e.target === $('modal-overlay')) closeModal(); };
};

function renderStatusBtns(completed) {
  return completed
    ? `<span class="done-pill"><i class="fa-solid fa-circle-check"></i> Leitura concluída</span>
       <button class="btn btn-ghost btn-sm" id="m-unmark"><i class="fa-solid fa-rotate-left"></i> Desmarcar</button>`
    : `<button class="btn btn-green btn-sm" id="m-mark"><i class="fa-solid fa-check"></i> Marcar como lida</button>`;
}
function bindStatusBtns(doSave) {
  const mk = $('m-mark'); const um = $('m-unmark');
  if (mk) mk.onclick = () => doSave(true);
  if (um) um.onclick = () => doSave(false);
}
function renderTags(hls) {
  if (!hls.length) return '<span class="empty-tag">Nenhum trecho adicionado ainda</span>';
  return hls.map((h, i) => `<span class="tag"><i class="fa-solid fa-bookmark" style="font-size:.7rem"></i> ${h}
    <button class="tag-x" onclick="_removeHL(${i})"><i class="fa-solid fa-xmark"></i></button></span>`).join('');
}
window.closeModal = () => { $('modal-overlay').style.display = 'none'; };

// ── INIT ──
async function initSession(session) {
  if (!session?.user) return false;
  S.user = session.user;
  const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  S.profile = profile;
  await loadReadings(session.user.id);
  return true;
}

(async () => {
  $('splash').classList.remove('hide');

  // FIX: Detect OAuth hash fragment (access_token in URL) — fixes mobile redirect
  if (window.location.hash && window.location.hash.includes('access_token')) {
    // Give Supabase a moment to parse the hash
    await new Promise(r => setTimeout(r, 200));
  }

  const { data: { session } } = await sb.auth.getSession();
  if (session && await initSession(session)) {
    history.replaceState(null, '', window.location.pathname + window.location.search);
    showApp(); return;
  }

  showLogin();

  // This catches the SIGNED_IN event after OAuth redirect on mobile
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      if (await initSession(session)) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
        showApp();
      }
    } else if (event === 'SIGNED_OUT') {
      showLogin();
    }
  });
})();
</script>
